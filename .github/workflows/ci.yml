name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Django>=6.0 仅支持较新 Python，避免在不兼容版本上安装失败
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 安装依赖
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff 检查
        run: ruff check .
      - name: 单元测试
        run: pytest -q
