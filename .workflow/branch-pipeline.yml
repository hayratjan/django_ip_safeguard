version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
stages:
  - stage: 
    name: compile
    displayName: 编译
    steps:
      - step: build@python
        name: build_python
        displayName: Python 构建
        # 与 pyproject.toml 中 requires-python >=3.10 一致，避免 3.9 下解析/运行不兼容
        pythonVersion: '3.10'
        # 非必填字段，开启后表示将构建产物暂存，但不会上传到制品库中，7天后自动清除
        artifacts:
            # 构建产物名字，作为产物的唯一标识可向下传递，支持自定义，默认为BUILD_ARTIFACT。在下游可以通过${BUILD_ARTIFACT}方式引用来获取构建物地址
          - name: BUILD_ARTIFACT
            # 构建产物获取路径，是指代码编译完毕之后构建物的所在路径
            path:
              - ./
        # 悬镜 / Gitee 部分环境下 cwd 为 /root/workspace，代码在子目录；多条 command 可能各自独立 shell，故合并为一段脚本并先定位仓库根
        commands:
          - |
            set -e
            locate_repo_root() {
              if [ -f pyproject.toml ] && [ -f requirements.txt ]; then return 0; fi
              if [ -n "${GITEE_REPO:-}" ]; then
                for d in "$GITEE_REPO" "/root/workspace/$GITEE_REPO" "./$GITEE_REPO"; do
                  if [ -d "$d" ] && [ -f "$d/pyproject.toml" ] && [ -f "$d/requirements.txt" ]; then cd "$d"; return 0; fi
                done
              fi
              found="$(find /root/workspace -maxdepth 8 -name pyproject.toml -type f 2>/dev/null | head -n 1)"
              if [ -z "$found" ]; then found="$(find "$(pwd)" -maxdepth 8 -name pyproject.toml -type f 2>/dev/null | head -n 1)"; fi
              if [ -n "$found" ]; then
                cd "$(dirname "$found")"
                [ -f requirements.txt ] && return 0
              fi
              echo "错误: 未定位到仓库根（需同时存在 pyproject.toml 与 requirements.txt）。pwd=$(pwd) GITEE_REPO=${GITEE_REPO:-}" >&2
              ls -la /root/workspace 2>/dev/null || ls -la >&2
              exit 1
            }
            locate_repo_root
            echo "仓库根目录: $(pwd)"
            python3 -m pip install --upgrade pip
            pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
            pip3 install -r requirements.txt
            pip3 install -e .
            python3 ./main.py
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        # 上游构建任务定义的产物名，默认BUILD_ARTIFACT
        dependArtifact: BUILD_ARTIFACT
        # 上传到制品库时的制品命名，默认output
        artifactName: output
        dependsOn: build_python
  - stage: 
    name: release
    displayName: 发布
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: '发布'
        # 上游上传制品任务的产出
        dependArtifact: output
        # 发布制品版本号
        version: '1.0.0.0'
        # 是否开启版本号自增，默认开启
        autoIncrement: true
triggers:
  push:
    branches:
      exclude:
        - master
      include:
        - .*
