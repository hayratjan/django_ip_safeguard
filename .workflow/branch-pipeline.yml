version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
stages:
  - stage: 
    name: compile
    displayName: 编译
    steps:
      - step: build@python
        name: build_python
        displayName: Python 构建
        # 与 pyproject.toml 中 requires-python >=3.10 一致
        pythonVersion: '3.10'
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./
        # build@python 自带 step.sh（制品/环境相关）；OpenSCA 报告需单独添加「OpenSCA 开源组件检测」插件步骤
        commands:
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip3 install -r requirements.txt
          - pip3 install -e .
          - python3 ./main.py
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_python
  - stage: 
    name: release
    displayName: 发布
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: '发布'
        dependArtifact: output
        version: '1.0.0.0'
        autoIncrement: true
triggers:
  push:
    branches:
      exclude:
        - master
      include:
        - .*
